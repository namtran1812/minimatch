name: MiniMatch CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libboost-dev \
            libboost-system-dev \
            libboost-thread-dev \
            libsqlite3-dev \
            libssl-dev \
            zlib1g-dev

      - name: Configure
        run: |
          cmake \
            -S . \
            -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DMINIMATCH_BUILD_TESTS=ON \
            -DMINIMATCH_BOOST_ROOT=/usr

      - name: Build
        run: |
          cmake --build build \
            --parallel 2

      - name: Run tests
        run: |
          ctest \
            --test-dir build \
            --output-on-failure

  sanitizers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libboost-dev \
            libboost-system-dev \
            libboost-thread-dev \
            libsqlite3-dev \
            libssl-dev \
            zlib1g-dev

      - name: Configure ASan + UBSan
        run: |
          cmake \
            -S . \
            -B build-asan \
            -DCMAKE_BUILD_TYPE=Debug \
            -DMINIMATCH_BUILD_TESTS=ON \
            -DMINIMATCH_BOOST_ROOT=/usr \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build ASan + UBSan
        run: |
          cmake --build build-asan \
            --parallel 2

      - name: Run sanitizer tests
        env:
          MIN_MATCHING_THROUGHPUT: "75000"
          MAX_MATCHING_P99_NS: "75000"
          MAX_DROP_COPY_SINGLE_100K_NS: "150000"
        run: |
          ctest \
            --test-dir build-asan \
            --output-on-failure
