services:
  minimatch:
    build:
      context: .
    image: minimatch:latest
    container_name: minimatch
    environment:
      PORT: "10000"
      LIVE_SYMBOL: btcusd
      EXECUTION_DB_PATH: /app/data/executions/router_executions.db
      ROUTER_COINBASE_TAKER_FEE_BPS: ${ROUTER_COINBASE_TAKER_FEE_BPS:-60}
      ROUTER_KRAKEN_TAKER_FEE_BPS: ${ROUTER_KRAKEN_TAKER_FEE_BPS:-40}
      ROUTER_BINANCE_TAKER_FEE_BPS: ${ROUTER_BINANCE_TAKER_FEE_BPS:-10}
      ROUTER_COINBASE_LATENCY_MS: ${ROUTER_COINBASE_LATENCY_MS:-0}
      ROUTER_KRAKEN_LATENCY_MS: ${ROUTER_KRAKEN_LATENCY_MS:-0}
      ROUTER_BINANCE_LATENCY_MS: ${ROUTER_BINANCE_LATENCY_MS:-0}
      ROUTER_LATENCY_COST_BPS_PER_MS: ${ROUTER_LATENCY_COST_BPS_PER_MS:-0.05}
    ports:
      - "8080:10000"
    volumes:
      - ./data/executions:/app/data/executions

  prometheus:
    image: prom/prometheus:latest
    container_name: minimatch-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - minimatch

  grafana:
    image: grafana/grafana:latest
    container_name: minimatch-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
